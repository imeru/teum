<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#102334" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>틈 (TEUM) — 모든 틈을 의미 있는 진전으로</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<!-- 로그인 게이트 (로그인 전까지 앱 위를 덮음) -->
<div id="authGate" class="auth-gate show checking">
  <div class="auth-card">
    <img class="auth-logo" src="icons/teum-logo-horizontal.svg" alt="TEUM" />
    <div class="auth-checking">
      <div class="auth-spinner" aria-hidden="true"></div>
      <p class="auth-note">불러오는 중…</p>
    </div>
    <div class="auth-login">
      <h1 class="auth-title">모든 틈을<br>의미 있는 진전으로</h1>
      <p class="auth-sub">GTD · 타임블로킹 · 뽀모도로로<br>지금 가진 틈을 가장 잘 쓰는 하루.</p>
      <button id="gate-google" class="auth-google" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Google로 시작하기
      </button>
      <p class="auth-note">로그인하면 모든 기기에서 같은 데이터로 이어집니다.</p>
    </div>
  </div>
</div>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img class="brand-mark" src="icons/logo-symbol-tight.svg" alt="TEUM" /> TEUM</div>
    <button class="nav" data-view="today"><span class="ico">📅</span> 오늘 <span class="count" id="c-today"></span></button>
    <button class="nav" data-view="suggest"><span class="ico">✨</span> 지금 이 틈</button>
    <button class="nav" data-view="plan"><span class="ico">🗓️</span> 타임박스</button>
    <button class="nav" data-view="pomodoro"><span class="ico">🍅</span> 뽀모도로 <span class="count" id="c-pomo"></span></button>

    <div class="nav-section">GTD</div>
    <button class="nav" data-view="gtdboard"><span class="ico">🗂️</span> GTD 보드 <span class="count" id="c-gtd"></span></button>
    <button class="nav" data-view="done"><span class="ico">✅</span> 완료</button>

    <div class="nav-section">돌아보기</div>
    <button class="nav" data-view="review"><span class="ico">🌙</span> 일일 리뷰</button>
    <button class="nav" data-view="weekreview"><span class="ico">📈</span> 주간 리뷰</button>

    <div class="nav-section">프로젝트</div>
    <div id="projectNav"></div>
    <button class="nav" id="addProjectBtn"><span class="ico">＋</span> 프로젝트 추가</button>

    <div id="tagSection">
      <div class="nav-section">태그</div>
      <div id="tagNav"></div>
    </div>

    <div style="margin-top:auto"></div>
    <button class="nav" data-view="settings"><span class="ico">⚙️</span> 설정 <span class="badge-sync" id="syncBadge">로컬</span></button>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="btn ghost menu-btn" id="menuBtn">☰</button>
      <div>
        <h1 id="viewTitle">오늘</h1>
        <div class="sub" id="viewSub"></div>
      </div>
      <div class="spacer"></div>
      <button class="btn" id="pomoMini" style="display:none">🍅 <span id="pomoMiniTime">25:00</span></button>
      <button class="btn primary" id="newTaskBtn">＋ 새 할 일</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Task modal -->
<div class="overlay" id="taskOverlay">
  <div class="modal">
    <div class="modal-head" id="taskModalTitle">새 할 일</div>
    <div class="modal-body">
      <div class="field">
        <label>제목</label>
        <input id="f-title" placeholder="무엇을 할까요?" />
      </div>
      <div class="field">
        <label>메모</label>
        <textarea id="f-notes" rows="2" placeholder="세부 내용 (선택)"></textarea>
      </div>
      <div class="field">
        <label>체크리스트 <span id="f-checklist-count" class="cl-count"></span></label>
        <div id="f-checklist"></div>
        <button type="button" class="btn sm cl-add" id="f-add-sub">＋ 세부 항목 추가</button>
      </div>
      <div class="row">
        <div class="field">
          <label>GTD 상태</label>
          <select id="f-status">
            <option value="inbox">📥 Inbox</option>
            <option value="next">⚡ 다음 행동</option>
            <option value="waiting">⏳ 대기 중</option>
            <option value="someday">💭 언젠가</option>
          </select>
        </div>
        <div class="field">
          <label>프로젝트</label>
          <select id="f-project"><option value="">없음</option></select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>마감일 / 시간</label>
          <div style="display:flex;gap:8px">
            <input id="f-due" type="date" style="flex:1;min-width:0" />
            <input id="f-duetime" type="time" style="flex:0 0 108px" />
          </div>
        </div>
        <div class="field">
          <label>태그 (쉼표 구분)</label>
          <input id="f-tags" placeholder="@집, @연구, 30분" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>우선순위</label>
          <div class="prio-pick" id="prioPick">
            <button data-p="1">P1</button>
            <button data-p="2">P2</button>
            <button data-p="3">P3</button>
            <button data-p="4" class="sel">P4</button>
          </div>
        </div>
        <div class="field">
          <label>예상 소요(분)</label>
          <input id="f-estimate" type="number" min="5" step="5" placeholder="예: 30" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>타임블록 날짜</label>
          <input id="f-blockdate" type="date" />
        </div>
        <div class="field">
          <label>시작 시각</label>
          <input id="f-blockstart" type="time" />
        </div>
        <div class="field">
          <label>소요(분)</label>
          <input id="f-blockdur" type="number" min="15" step="15" placeholder="60" />
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="taskDeleteBtn" style="margin-right:auto;color:var(--p1)">삭제</button>
      <button class="btn" id="taskCancelBtn">취소</button>
      <button class="btn primary" id="taskSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- Project modal -->
<div class="overlay" id="projOverlay">
  <div class="modal" style="width:min(400px,100%)">
    <div class="modal-head">새 프로젝트</div>
    <div class="modal-body">
      <div class="field"><label>이름</label><input id="p-name" placeholder="예: 논문 A 투고" /></div>
      <div class="field"><label>색상</label>
        <div class="prio-pick" id="projColors"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="projCancelBtn">취소</button>
      <button class="btn primary" id="projSaveBtn">추가</button>
    </div>
  </div>
</div>

<!-- Event modal -->
<div class="overlay" id="eventOverlay">
  <div class="modal" style="width:min(460px,100%)">
    <div class="modal-head" id="eventModalTitle">🔁 정기 일정 추가</div>
    <div class="modal-body">
      <div class="field"><label>제목</label><input id="ev-title" placeholder="예: 휴가, 출장, 건축환경 강의" /></div>
      <div class="row">
        <div class="field"><label>유형</label>
          <select id="ev-freq"><option value="weekly">정기 (주 단위)</option><option value="monthly">정기 (월 단위)</option><option value="once">일반 (종일·기간)</option></select>
        </div>
        <div class="field" id="ev-interval-field"><label>간격</label>
          <select id="ev-interval">
            <option value="1">1 (매주·매월)</option>
            <option value="2">2 (격주·격월)</option>
            <option value="3">3마다</option>
            <option value="4">4마다</option>
          </select>
        </div>
      </div>
      <div class="field" id="ev-allday-field" style="display:none"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none"><input type="checkbox" id="ev-allday" style="width:auto" /> 종일 (시간 없음)</label></div>
      <div class="row" id="ev-time-row">
        <div class="field"><label>시작 시각</label><input id="ev-start" type="time" value="09:00" /></div>
        <div class="field"><label>소요(분)</label><input id="ev-dur" type="number" min="10" step="10" value="60" /></div>
      </div>
      <div class="field" id="ev-days-field"><label>반복 요일</label>
        <div class="weekday-pick" id="evDays">
          <button type="button" data-d="0">일</button>
          <button type="button" data-d="1">월</button>
          <button type="button" data-d="2">화</button>
          <button type="button" data-d="3">수</button>
          <button type="button" data-d="4">목</button>
          <button type="button" data-d="5">금</button>
          <button type="button" data-d="6">토</button>
        </div>
      </div>
      <div class="field" id="ev-monthmode-field" style="display:none"><label>월 반복 기준</label>
        <select id="ev-monthmode"><option value="date">매월 같은 날짜</option><option value="weekday">매월 n번째 요일</option></select>
      </div>
      <div class="row" id="ev-monthweek-field" style="display:none">
        <div class="field"><label>주차</label>
          <select id="ev-ordinal"><option value="1">첫째</option><option value="2">둘째</option><option value="3">셋째</option><option value="4">넷째</option><option value="5">다섯째</option><option value="-1">마지막</option></select>
        </div>
        <div class="field"><label>요일</label>
          <select id="ev-weekday"><option value="0">일</option><option value="1">월</option><option value="2">화</option><option value="3">수</option><option value="4">목</option><option value="5">금</option><option value="6">토</option></select>
        </div>
      </div>
      <div class="row">
        <div class="field"><label id="ev-startdate-label">시작일</label><input id="ev-startdate" type="date" /></div>
        <div class="field" id="ev-endmode-field"><label>종료 조건</label>
          <select id="ev-endmode">
            <option value="never">없음 (계속 반복)</option>
            <option value="date">종료일까지</option>
            <option value="count">횟수 후 종료</option>
          </select>
        </div>
        <div class="field" id="ev-onceend-field" style="display:none"><label>종료일 (기간)</label><input id="ev-onceend" type="date" /></div>
      </div>
      <div class="field" id="ev-enddate-field" style="display:none"><label>종료일</label><input id="ev-enddate" type="date" /></div>
      <div class="field" id="ev-count-field" style="display:none"><label>반복 횟수 (시작일로부터)</label><input id="ev-count" type="number" min="1" value="10" /></div>
      <div class="field" id="ev-exholiday-field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none"><input type="checkbox" id="ev-exholiday" style="width:auto" /> 공휴일·휴무일 제외</label></div>
      <div class="field"><label>색상</label><div class="prio-pick" id="evColors"></div></div>
      <div class="note" id="ev-note">월 단위는 시작일의 '일(日)'에 반복됩니다. 캘린더·스케줄표에 자동 표시됩니다.</div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="evDeleteBtn" style="margin-right:auto;color:var(--p1)">삭제</button>
      <button class="btn" id="evCancelBtn">취소</button>
      <button class="btn primary" id="evSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- Settings handled in content -->
<script src="constants.js"></script>
<script src="helpers.js"></script>
<script src="logic.js"></script>
<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#102334" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>틈 (TEUM) — 모든 틈을 의미 있는 진전으로</title>
<style>
  :root{
    /* 중립 우선 — 색은 의미를 전달할 때만 (초록=진전, 파랑=집중, 앰버=주의, 빨강=지연) */
    --bg:#f7f7f4; --panel:#ffffff; --panel-2:#f3f3ee; --border:#eae9e3;
    --text:#16242f; --muted:#7e8a90; --accent:#16324a; --accent-soft:#e9edf0; --on-accent:#ffffff; --sage:#83bfa7;
    --p1:#c97a16; --p2:#b8924a; --p3:#5f93a6; --p4:#aeb6b6;
    --green:#4f9b76; --red:#d2483f; --amber:#c98a1a;
    --shadow:0 1px 2px rgba(30,33,38,.04),0 6px 20px rgba(30,33,38,.05);
    --radius:14px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#14151a; --panel:#1d1f25; --panel-2:#262830; --border:#2f313a;
      --text:#e9eae6; --muted:#969a96; --accent:#8fa6bf; --accent-soft:#262b34; --on-accent:#15161a; --sage:#9cc0a8;
      --p1:#d59446; --p2:#c2a060; --p3:#8fa3b8; --p4:#5d5e66;
      --green:#5fae82; --red:#e15a52; --amber:#d6a13a;
      --shadow:0 1px 2px rgba(0,0,0,.2),0 6px 20px rgba(0,0,0,.25); }
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .app{display:grid;grid-template-columns:212px 1fr;height:100dvh;overflow:hidden}
  .backdrop{display:none}  /* 데스크톱에서 그리드 칸 차지 방지 */

  /* Sidebar */
  .sidebar{background:var(--panel);border-right:1px solid var(--border);padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 12px;font-weight:800;font-size:17px;letter-spacing:1.5px}
  .brand .brand-mark{width:26px;height:26px;display:inline-block;object-fit:contain}
  .nav-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 9px 3px;font-weight:700}
  .nav{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;color:var(--text);font-size:13.5px;border:none;background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden}
  .nav:hover{background:var(--panel-2)}
  .nav.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .nav.nav-drop{background:var(--accent-soft);outline:2px dashed var(--accent);outline-offset:-2px;color:var(--accent)}
  .nav .ico{width:18px;text-align:center}
  .nav .count{margin-left:auto;font-size:12px;color:var(--muted);background:var(--panel-2);padding:1px 8px;border-radius:20px}
  .nav.active .count{background:#fff3;color:var(--accent)}
  .proj-color{width:10px;height:10px;border-radius:50%;display:inline-block}

  /* Main */
  .main{display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:12px;padding:18px 30px;border-bottom:1px solid var(--border);background:var(--panel)}
  .topbar h1{margin:0;font-size:22px;letter-spacing:-.5px;font-weight:700}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .spacer{flex:1}
  .content{flex:1;overflow-y:auto;padding:28px 30px 96px}

  .quickadd{display:flex;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow);margin-bottom:16px}
  .quickadd input{flex:1;border:none;background:none;color:var(--text);font-size:15px;outline:none}
  .quickadd .hint{color:var(--muted);font-size:11px;white-space:nowrap}
  .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 14px;border-radius:10px;font-size:14px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;flex:0 0 auto}
  .btn:hover{background:var(--panel-2)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.ghost{border-color:transparent;background:transparent}

  /* Task list */
  .tasklist{display:flex;flex-direction:column;gap:8px}
  .task{display:flex;align-items:flex-start;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:15px 18px;box-shadow:var(--shadow);transition:.12s}
  .task:hover{border-color:#cdd0e0}
  .task.dragging{opacity:.5}
  .check{width:20px;height:20px;border-radius:50%;border:2px solid var(--p4);margin-top:1px;flex-shrink:0;display:grid;place-items:center;background:none;color:#fff;font-size:12px}
  .check.p1{border-color:var(--p1)} .check.p2{border-color:var(--p2)} .check.p3{border-color:var(--p3)}
  .task.done .check{background:var(--green);border-color:var(--green)}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:15px;line-height:1.35;word-break:keep-all;overflow-wrap:anywhere}
  .task.done .task-title{text-decoration:line-through;color:var(--muted)}
  .task-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center}
  .chip{font-size:12px;padding:2px 9px;border-radius:20px;background:var(--panel-2);color:var(--muted);border:1px solid var(--border);display:inline-flex;gap:4px;align-items:center;white-space:nowrap;flex:0 0 auto}
  .chip.tag{color:var(--accent);background:var(--accent-soft);border-color:transparent;cursor:pointer}
  .chip.due{color:var(--p2)}
  .chip.due.overdue{color:var(--red);font-weight:600}
  .chip.block{color:var(--p3)}
  .task-actions{display:flex;gap:2px;opacity:0;transition:.12s}
  .task:hover .task-actions{opacity:1}
  .iconbtn{border:none;background:none;color:var(--muted);padding:5px;border-radius:8px;font-size:14px}
  .iconbtn:hover{background:var(--panel-2);color:var(--text)}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
  .empty .big{font-size:40px;margin-bottom:10px}

  /* Time-box view */
  .tb{display:grid;grid-template-columns:minmax(280px,4fr) minmax(0,6fr);gap:16px;height:100%;min-height:0}
  .tb-left{display:flex;flex-direction:column;gap:14px;overflow-y:auto;padding-right:2px;min-height:0}
  .tb-right{display:flex;flex-direction:column;gap:12px;min-width:0;min-height:0}
  .tb-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .tb-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:800;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .top3-slot{display:flex;align-items:center;gap:10px;border:1.5px dashed var(--border);border-radius:11px;padding:10px 12px;margin-bottom:8px;min-height:46px;font-size:14px;color:var(--muted);word-break:keep-all}
  .top3-slot:last-child{margin-bottom:0}
  .top3-slot.filled{border-style:solid;background:var(--panel-2);color:var(--text)}
  .top3-slot.dragover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .top3-num{width:22px;height:22px;border-radius:50%;background:var(--panel-2);display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
  .top3-slot.filled .top3-num{background:var(--accent);color:var(--on-accent)}
  .top3-slot .t3-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pool-group-title{font-size:12px;color:var(--muted);font-weight:700;margin:12px 2px 6px}
  .pool-group-title:first-child{margin-top:2px}
  .pool-task{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:10px 12px;font-size:14px;box-shadow:var(--shadow);cursor:grab;margin-bottom:7px;word-break:keep-all}
  .pool-task:active{cursor:grabbing}
  .pool-task.overdue{border-left:3px solid var(--p1)}
  .pt-dot{width:9px;height:9px;border-radius:50%;background:var(--p4);flex-shrink:0}
  .pt-dot.p1{background:var(--p1)} .pt-dot.p2{background:var(--p2)} .pt-dot.p3{background:var(--p3)}
  .pt-title{flex:1;min-width:0}
  .pt-badge{font-size:11px;color:var(--red);background:rgba(210,72,63,.12);padding:1px 7px;border-radius:10px;white-space:nowrap}
  .overdue-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(210,72,63,.08);border:1px solid rgba(210,72,63,.28);color:var(--red);border-radius:11px;padding:10px 12px;font-size:13px;font-weight:600;margin-bottom:10px}
  .overdue-banner button{border:none;background:none;color:var(--red);font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap}

  .tb-week{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin}
  .day-cell{flex:0 0 auto;width:52px;text-align:center;padding:7px 0;border-radius:12px;border:1px solid var(--border);background:var(--panel);cursor:pointer;transition:.1s}
  .day-cell:hover{border-color:var(--accent)}
  .day-cell .dow{font-size:11px;color:var(--muted)}
  .day-cell .dom{font-size:18px;font-weight:700;margin-top:1px}
  .day-cell.sel{background:var(--accent);border-color:var(--accent)}
  .day-cell.sel .dow,.day-cell.sel .dom{color:var(--on-accent)}
  .day-cell.today:not(.sel){border-color:var(--accent);color:var(--accent)}
  .day-cell.today:not(.sel) .dom{color:var(--accent)}

  .calendar{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow-y:auto;box-shadow:var(--shadow);min-height:0}
  .cal-grid{position:relative;margin:8px 8px 12px 0}
  .cal-line{position:absolute;left:54px;right:6px;border-top:1px solid var(--border);pointer-events:none}
  .cal-line.half{border-top-style:dotted;opacity:.5}
  .cal-hour-label{position:absolute;left:0;width:46px;text-align:right;padding-right:8px;font-size:11px;color:var(--muted);transform:translateY(-7px);pointer-events:none}
  .drop-indic{position:absolute;left:54px;right:6px;height:0;border-top:2px solid var(--accent);z-index:5;pointer-events:none}
  .drop-indic::before{content:attr(data-time);position:absolute;left:-50px;top:-8px;font-size:10px;font-weight:700;color:var(--accent)}
  #pool.pool-dragover{outline:2px dashed var(--accent);outline-offset:4px;border-radius:8px}
  .now-line{position:absolute;left:54px;right:6px;height:2px;background:var(--red);z-index:4;pointer-events:none}
  .now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)}
  .now-line .now-time{position:absolute;left:-50px;top:-8px;font-size:10px;font-weight:700;color:var(--red)}
  .block-card{position:absolute;left:56px;right:8px;background:var(--accent-soft);border:1px solid var(--accent);border-left:3px solid var(--accent);border-radius:8px;padding:3px 8px;font-size:13px;color:var(--text);overflow:hidden;cursor:grab;z-index:2;box-sizing:border-box}
  .block-card:active{cursor:grabbing}
  .block-card .bc-main{display:flex;flex-direction:column;gap:0;overflow:hidden;height:100%;justify-content:center}
  .block-card .time{font-size:10px;color:var(--accent);font-weight:600;white-space:nowrap}
  .block-card .bc-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
  .block-card .bc-x{position:absolute;top:1px;right:1px;padding:2px;font-size:11px;z-index:3}
  .block-card .block-resize{position:absolute;left:0;right:0;bottom:0;height:10px;cursor:ns-resize;touch-action:none;z-index:3}
  .block-card .block-resize::after{content:'';position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:24px;height:3px;border-radius:3px;background:var(--accent);opacity:.45}
  .block-card.p1{border-left-color:var(--p1)} .block-card.p2{border-left-color:var(--p2)}
  .event-card{position:absolute;left:56px;right:8px;background:repeating-linear-gradient(45deg,var(--panel-2),var(--panel-2) 6px,transparent 6px,transparent 12px);border:1px solid var(--border);border-left:3px solid #0d9488;border-radius:8px;padding:3px 8px;font-size:13px;color:var(--text);overflow:hidden;z-index:1;box-sizing:border-box}
  .event-card .bc-main{display:flex;flex-direction:column;gap:0;height:100%;justify-content:center;overflow:hidden}
  .event-card .time{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
  .event-card .bc-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}

  /* Mini month calendar */
  .mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px}
  .mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .mc-dow{font-size:10px;color:var(--muted);text-align:center;padding:2px 0}
  .mc-day{position:relative;text-align:center;font-size:12px;padding:5px 0;border-radius:8px;cursor:pointer;color:var(--text)}
  .mc-day:hover{background:var(--panel-2)}
  .mc-day.today{color:var(--accent);font-weight:700}
  .mc-day.sel{background:var(--accent);color:var(--on-accent)}
  .mc-dot{position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
  .mc-day.sel .mc-dot{background:#fff}

  /* Recurring event list + picker */
  .event-row{display:flex;align-items:center;gap:9px;padding:7px 2px;border-bottom:1px solid var(--border)}
  .event-row:last-child{border-bottom:none}
  .ev-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .ev-info{flex:1;min-width:0;display:flex;flex-direction:column}
  .ev-info small{color:var(--muted);font-size:11px}
  .weekday-pick{display:flex;gap:5px}
  .weekday-pick button{flex:1;border:1px solid var(--border);background:var(--panel-2);border-radius:8px;padding:8px 0;font-size:13px;color:var(--muted)}
  .weekday-pick button.sel{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}

  /* Pomodoro */
  .pomo{max-width:520px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:10px}
  .pomo-modes{display:flex;gap:6px}
  .pomo-modes button{border:1px solid var(--border);background:var(--panel);color:var(--muted);padding:8px 16px;border-radius:20px;font-size:13px}
  .pomo-modes button.sel{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
  .pomo-modes button.sel.brk{background:var(--green);border-color:var(--green)}
  .pomo-dial{position:relative;width:260px;height:260px;display:grid;place-items:center}
  .pomo-dial svg{position:absolute;inset:0;transform:rotate(-90deg)}
  .pomo-time{font-size:60px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .pomo-state{font-size:13px;color:var(--muted);margin-top:2px}
  .pomo-controls{display:flex;gap:10px}
  .pomo-controls .btn{padding:12px 26px;font-size:16px}
  .pomo-task{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
  .pomo-task select{width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;padding:10px;font-size:14px;margin-top:8px}
  .pomo-stats{display:flex;gap:10px;width:100%}
  .pomo-stat{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;box-shadow:var(--shadow)}
  .pomo-stat .n{font-size:26px;font-weight:800}
  .pomo-stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .pomo-settings{display:flex;gap:10px;width:100%;flex-wrap:wrap;justify-content:center}
  .pomo-settings label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px;align-items:center}
  .pomo-settings input{width:64px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:8px;padding:6px;text-align:center;font-size:14px}
  .chip.pomo{color:var(--p3);border-color:transparent;background:var(--accent-soft)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .pomo-running .pomo-time{animation:pulse 2s ease-in-out infinite}

  /* Smart suggest (지금 이 틈) */
  .suggest{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
  .gap-pick{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .gap-pick .q{font-size:15px;font-weight:600;margin-bottom:12px}
  .gap-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .gap-chips button{border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:22px;padding:9px 16px;font-size:14px;font-weight:600}
  .gap-chips button.sel{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
  .gap-chips input{width:84px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;padding:8px 10px;font-size:14px}
  .suggest-lead{font-size:13px;color:var(--muted);margin:2px 2px -4px}
  .sg-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow)}
  .sg-card.top{border-color:var(--accent);background:var(--accent-soft)}
  .sg-rank{width:26px;height:26px;border-radius:50%;background:var(--panel-2);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
  .sg-card.top .sg-rank{background:var(--accent);color:var(--on-accent)}
  .sg-body{flex:1;min-width:0}
  .sg-title{font-size:15px;word-break:keep-all}
  .sg-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
  .sg-actions{display:flex;gap:6px;flex-shrink:0}

  /* Daily review (일일 리뷰) */
  .review{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .rv-head{display:flex;align-items:center;gap:10px}
  .rv-headline{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);text-align:center}
  .rv-headline .big{font-size:18px;font-weight:700}
  .rv-headline .sub{font-size:13px;color:var(--muted);margin-top:4px}
  .rv-stats{display:flex;gap:10px}
  .rv-stat{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;box-shadow:var(--shadow)}
  .rv-stat .n{font-size:24px;font-weight:800}
  .rv-stat .n.green{color:var(--green)} .rv-stat .n.blue{color:var(--p3)}
  .rv-stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .rv-sec{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
  .rv-sec h3{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:700}
  .rv-item{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:14px;border-bottom:1px solid var(--border)}
  .rv-item:last-child{border-bottom:none}
  .rv-item .done-dot{color:var(--green)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,17,23,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;width:min(520px,100%);max-height:90dvh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;font-weight:700}
  .modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;color:var(--muted);font-weight:600}
  .field input,.field textarea,.field select{border:1px solid var(--border);background:var(--panel-2);color:var(--text);border-radius:10px;padding:10px 12px;font-size:14px;outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .prio-pick{display:flex;gap:8px}
  .prio-pick button{flex:1;border:1px solid var(--border);background:var(--panel-2);border-radius:10px;padding:8px;font-size:13px;color:var(--muted)}
  .prio-pick button.sel{color:#fff;border-color:transparent}
  .prio-pick button[data-p="1"].sel{background:var(--p1)} .prio-pick button[data-p="2"].sel{background:var(--p2)}
  .prio-pick button[data-p="3"].sel{background:var(--p3)} .prio-pick button[data-p="4"].sel{background:var(--p4)}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .seg{display:flex;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:3px}
  .seg button{border:none;background:none;color:var(--muted);padding:6px 12px;border-radius:8px;font-size:13px}
  .seg button.sel{background:var(--panel);color:var(--text);box-shadow:var(--shadow)}
  .note{font-size:12px;color:var(--muted);line-height:1.5}
  .badge-sync{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel-2);color:var(--muted);border:1px solid var(--border)}
  .badge-sync.on{color:var(--green);border-color:var(--green)}
  code{background:var(--panel-2);padding:1px 6px;border-radius:5px;font-size:12px}
  pre{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:12px;overflow-x:auto;font-size:12px}

  /* Mobile */
  .mobi-tab{display:none}
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;inset:0 auto 0 0;width:78%;max-width:300px;z-index:40;transform:translateX(-100%);transition:.2s;box-shadow:0 0 40px rgba(0,0,0,.3)}
    .sidebar.open{transform:none}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;display:none}
    .backdrop.show{display:block}
    .menu-btn{display:inline-flex!important}
    .tb{grid-template-columns:1fr;height:auto}
    .tb-left{overflow:visible}
    .tb-right{min-height:70vh}
    .content{padding:14px 14px 90px}
    .quickadd .hint{display:none}
    .topbar{padding:12px 14px}
    .topbar h1{font-size:18px}
  }
  @media (max-width:520px){
    #newTaskBtn{font-size:0;padding:9px 12px}
    #newTaskBtn::after{content:'＋';font-size:18px}
  }
  .menu-btn{display:none}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img class="brand-mark" src="icons/logo-symbol-tight.svg" alt="TEUM" /> TEUM</div>
    <button class="nav" data-view="suggest"><span class="ico">✨</span> 지금 이 틈</button>
    <button class="nav" data-view="today"><span class="ico">📅</span> 오늘 <span class="count" id="c-today"></span></button>
    <button class="nav" data-view="inbox"><span class="ico">📥</span> Inbox <span class="count" id="c-inbox"></span></button>
    <button class="nav" data-view="next"><span class="ico">⚡</span> 다음 행동 <span class="count" id="c-next"></span></button>
    <button class="nav" data-view="plan"><span class="ico">🗓️</span> 타임박스</button>
    <button class="nav" data-view="pomodoro"><span class="ico">🍅</span> 뽀모도로 <span class="count" id="c-pomo"></span></button>
    <button class="nav" data-view="review"><span class="ico">🌙</span> 일일 리뷰</button>

    <div class="nav-section">GTD</div>
    <button class="nav" data-view="waiting"><span class="ico">⏳</span> 대기 중 <span class="count" id="c-waiting"></span></button>
    <button class="nav" data-view="someday"><span class="ico">💭</span> 언젠가 <span class="count" id="c-someday"></span></button>
    <button class="nav" data-view="done"><span class="ico">✅</span> 완료</button>

    <div class="nav-section">프로젝트</div>
    <div id="projectNav"></div>
    <button class="nav" id="addProjectBtn"><span class="ico">＋</span> 프로젝트 추가</button>

    <div class="nav-section">태그</div>
    <div id="tagNav"></div>

    <div style="margin-top:auto"></div>
    <button class="nav" data-view="settings"><span class="ico">⚙️</span> 설정 <span class="badge-sync" id="syncBadge">로컬</span></button>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="btn ghost menu-btn" id="menuBtn">☰</button>
      <div>
        <h1 id="viewTitle">오늘</h1>
        <div class="sub" id="viewSub"></div>
      </div>
      <div class="spacer"></div>
      <button class="btn" id="pomoMini" style="display:none">🍅 <span id="pomoMiniTime">25:00</span></button>
      <button class="btn primary" id="newTaskBtn">＋ 새 할 일</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Task modal -->
<div class="overlay" id="taskOverlay">
  <div class="modal">
    <div class="modal-head" id="taskModalTitle">새 할 일</div>
    <div class="modal-body">
      <div class="field">
        <label>제목</label>
        <input id="f-title" placeholder="무엇을 할까요?" />
      </div>
      <div class="field">
        <label>메모</label>
        <textarea id="f-notes" rows="2" placeholder="세부 내용 (선택)"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label>GTD 상태</label>
          <select id="f-status">
            <option value="inbox">📥 Inbox</option>
            <option value="next">⚡ 다음 행동</option>
            <option value="waiting">⏳ 대기 중</option>
            <option value="someday">💭 언젠가</option>
          </select>
        </div>
        <div class="field">
          <label>프로젝트</label>
          <select id="f-project"><option value="">없음</option></select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>마감일 / 시간</label>
          <div style="display:flex;gap:8px">
            <input id="f-due" type="date" style="flex:1;min-width:0" />
            <input id="f-duetime" type="time" style="flex:0 0 108px" />
          </div>
        </div>
        <div class="field">
          <label>태그 (쉼표 구분)</label>
          <input id="f-tags" placeholder="@집, @연구, 30분" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>우선순위</label>
          <div class="prio-pick" id="prioPick">
            <button data-p="1">P1</button>
            <button data-p="2">P2</button>
            <button data-p="3">P3</button>
            <button data-p="4" class="sel">P4</button>
          </div>
        </div>
        <div class="field">
          <label>예상 소요(분)</label>
          <input id="f-estimate" type="number" min="5" step="5" placeholder="예: 30" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>타임블록 날짜</label>
          <input id="f-blockdate" type="date" />
        </div>
        <div class="field">
          <label>시작 시각</label>
          <input id="f-blockstart" type="time" />
        </div>
        <div class="field">
          <label>소요(분)</label>
          <input id="f-blockdur" type="number" min="15" step="15" placeholder="60" />
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="taskDeleteBtn" style="margin-right:auto;color:var(--p1)">삭제</button>
      <button class="btn" id="taskCancelBtn">취소</button>
      <button class="btn primary" id="taskSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- Project modal -->
<div class="overlay" id="projOverlay">
  <div class="modal" style="width:min(400px,100%)">
    <div class="modal-head">새 프로젝트</div>
    <div class="modal-body">
      <div class="field"><label>이름</label><input id="p-name" placeholder="예: 논문 A 투고" /></div>
      <div class="field"><label>색상</label>
        <div class="prio-pick" id="projColors"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="projCancelBtn">취소</button>
      <button class="btn primary" id="projSaveBtn">추가</button>
    </div>
  </div>
</div>

<!-- Event modal -->
<div class="overlay" id="eventOverlay">
  <div class="modal" style="width:min(460px,100%)">
    <div class="modal-head" id="eventModalTitle">🔁 정기 일정 추가</div>
    <div class="modal-body">
      <div class="field"><label>제목</label><input id="ev-title" placeholder="예: 건축환경 강의, 연구실 미팅" /></div>
      <div class="row">
        <div class="field"><label>시작 시각</label><input id="ev-start" type="time" value="09:00" /></div>
        <div class="field"><label>소요(분)</label><input id="ev-dur" type="number" min="10" step="10" value="60" /></div>
      </div>
      <div class="row">
        <div class="field"><label>반복 주기</label>
          <select id="ev-freq"><option value="weekly">주 단위</option><option value="monthly">월 단위</option></select>
        </div>
        <div class="field"><label>간격</label>
          <select id="ev-interval">
            <option value="1">1 (매주·매월)</option>
            <option value="2">2 (격주·격월)</option>
            <option value="3">3마다</option>
            <option value="4">4마다</option>
          </select>
        </div>
      </div>
      <div class="field" id="ev-days-field"><label>반복 요일</label>
        <div class="weekday-pick" id="evDays">
          <button type="button" data-d="0">일</button>
          <button type="button" data-d="1">월</button>
          <button type="button" data-d="2">화</button>
          <button type="button" data-d="3">수</button>
          <button type="button" data-d="4">목</button>
          <button type="button" data-d="5">금</button>
          <button type="button" data-d="6">토</button>
        </div>
      </div>
      <div class="field" id="ev-monthmode-field" style="display:none"><label>월 반복 기준</label>
        <select id="ev-monthmode"><option value="date">매월 같은 날짜</option><option value="weekday">매월 n번째 요일</option></select>
      </div>
      <div class="row" id="ev-monthweek-field" style="display:none">
        <div class="field"><label>주차</label>
          <select id="ev-ordinal"><option value="1">첫째</option><option value="2">둘째</option><option value="3">셋째</option><option value="4">넷째</option><option value="5">다섯째</option><option value="-1">마지막</option></select>
        </div>
        <div class="field"><label>요일</label>
          <select id="ev-weekday"><option value="0">일</option><option value="1">월</option><option value="2">화</option><option value="3">수</option><option value="4">목</option><option value="5">금</option><option value="6">토</option></select>
        </div>
      </div>
      <div class="row">
        <div class="field"><label>시작일</label><input id="ev-startdate" type="date" /></div>
        <div class="field"><label>종료 조건</label>
          <select id="ev-endmode">
            <option value="never">없음 (계속 반복)</option>
            <option value="date">종료일까지</option>
            <option value="count">횟수 후 종료</option>
          </select>
        </div>
      </div>
      <div class="field" id="ev-enddate-field" style="display:none"><label>종료일</label><input id="ev-enddate" type="date" /></div>
      <div class="field" id="ev-count-field" style="display:none"><label>반복 횟수 (시작일로부터)</label><input id="ev-count" type="number" min="1" value="10" /></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none"><input type="checkbox" id="ev-exholiday" style="width:auto" /> 공휴일·휴무일 제외</label></div>
      <div class="field"><label>색상</label><div class="prio-pick" id="evColors"></div></div>
      <div class="note">월 단위는 시작일의 '일(日)'에 반복됩니다. 캘린더·스케줄표에 자동 표시됩니다.</div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="evDeleteBtn" style="margin-right:auto;color:var(--p1)">삭제</button>
      <button class="btn" id="evCancelBtn">취소</button>
      <button class="btn primary" id="evSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- Settings handled in content -->
<script src="app.js"></script>
</body>
</html>
